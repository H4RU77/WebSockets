<!DOCTYPE html>
<html>
<head>
    <title>Chat WebSocket</title>
    <style>
        body { font-family: Arial; }
        #chat { height: 300px; overflow-y: scroll; border: 1px solid gray; padding: 10px; }
    </style>
</head>
<body>

<h2>Chat en tiempo real (Maincra)</h2>

<div id="chat"></div>

<input id="messageInput" placeholder="Escribe un mensaje..." />
<button onclick="sendMessage()">Enviar</button>

<script>
    const nickname = prompt("Ingresa tu nickname:");
    const ws = new WebSocket("ws://" + window.location.host);

    const chat = document.getElementById("chat");

    ws.onopen = () => {
        ws.send(JSON.stringify({
            type: "join",
            nickname: nickname
        }));
    };

    ws.onmessage = (event) => {
        const message = JSON.parse(event.data);
        const div = document.createElement("div");

        if (message.type === "system") {
            div.innerHTML = "<i>" + message.text + "</i>";
        } else {
            div.innerHTML = "<b>" + message.nickname + ":</b> " + message.text;
        }

        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    };

    function sendMessage() {
        const input = document.getElementById("messageInput");
        ws.send(JSON.stringify({
            type: "chat",
            text: input.value
        }));
        input.value = "";
    }
</script>

</body>
</html>
